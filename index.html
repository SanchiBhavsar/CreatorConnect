<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Creator Collaboration System</title>
  <link rel="stylesheet" href="common.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body class="login-body">
  <!-- Login Card -->
  <div class="login-wrapper">
    <div class="login-card glass">
      <div class="login-logo">CC</div>
      <h1>Creator Collab</h1>
      <p class="subtitle">Campaign Management System</p>
      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="admin" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••" autocomplete="current-password" />
        </div>
        <div id="loginError" class="error-msg hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
        <p class="hint">Demo: <strong>admin / 12345</strong></p>
      </form>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
  <script src="js/storage.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
